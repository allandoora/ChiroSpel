<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galgje</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/galgje.css" />
</head>
<body>
<div class="wrap">
    <h1 class="title">Galgje</h1>
    <p class="subtitle">Raad het woord letter voor letter</p>
    <div class="main">
        <div class="galg-canvas">
            <svg id="galg-svg" viewBox="0 0 160 190" width="160" height="190" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="right">
            <div>
                <div class="hint-label">categorie</div>
                <span class="category" id="galg-cat">—</span>
                <div class="hint-label">woord</div>
                <div class="word-row" id="galg-word"></div>
            </div>
            <div>
                <div class="hint-label">levens</div>
                <div class="lives" id="galg-lives"></div>
                <div class="status" id="galg-status"></div>
                <button class="restart-btn" id="galg-restart" onclick="startGame()">↻ Nieuw woord</button>
            </div>
            <div>
                <div class="hint-label">toetsenbord</div>
                <div class="keyboard" id="galg-keyboard"></div>
            </div>
        </div>
    </div>
</div>
<script src="js/galgje.js"></script>
</body>
</html>
