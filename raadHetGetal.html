<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Raad het Getal</title>
    <link rel="stylesheet" href="css/raadHetGetal.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="bg-grid"></div>

<main class="container">
    <header>
        <div class="title-block">
            <span class="label">Spel #001</span>
            <h1>RAAD HET<br/><em>GETAL</em></h1>
        </div>
        <div class="range-badge">1 — 100</div>
    </header>

    <section class="game-area">
        <div class="feedback-panel" id="feedbackPanel">
            <div class="feedback-icon" id="feedbackIcon">?</div>
            <p class="feedback-text" id="feedbackText">Ik denk aan een getal tussen 1 en 100.</p>
            <p class="feedback-sub" id="feedbackSub">Wat zou het zijn?</p>
        </div>

        <div class="guess-history" id="guessHistory"></div>

        <div class="input-row">
            <input
                    type="number"
                    id="guessInput"
                    min="1"
                    max="100"
                    placeholder="???"
                    autocomplete="off"
            />
            <button id="guessBtn">RAAD</button>
        </div>

        <div class="stats-row">
            <div class="stat">
                <span class="stat-label">Pogingen</span>
                <span class="stat-value" id="attempts">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Record</span>
                <span class="stat-value" id="record">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">Gewonnen</span>
                <span class="stat-value" id="wins">0</span>
            </div>
        </div>
    </section>

    <button class="reset-btn" id="resetBtn">NIEUW SPEL</button>
</main>

<div class="win-overlay" id="winOverlay">
    <div class="win-card">
        <div class="win-number" id="winNumber"></div>
        <h2>GEVONDEN!</h2>
        <p id="winMsg"></p>
        <button id="playAgainBtn">SPEEL OPNIEUW</button>
    </div>
</div>

<script src="js/raadHetGetal.js"></script>
</body>
</html>
